<div class="projects-list" *ngIf="showcaseContent && projects.length > 0">
  
  <div class="projects-list__wrap" *ngFor="let showcase of showcaseContent">
    <h2 class="projects-list__title">{{ showcase.title }}</h2>
    <div class="projects-list__description" [innerHtml]="showcase.description"></div>
  </div>

  <project-filters></project-filters>

  <div class="projects-list__grid" *ngIf="projects.length > 0">
    <project class="projects-list__item"
             *ngFor="let project of projects; let i = index"
             [project]="project"
             [ngClass]="project.layout"
             [ngStyle]="{'order': i + 1}">
    </project>
  </div>
</div>
